<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>deltarun apps</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1.25rem;
    }
    h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
    p.sub { color: #94a3b8; margin: 0 0 2rem; }
    .apps { width: 100%; max-width: 28rem; display: flex; flex-direction: column; gap: 1rem; }
    a.app {
      display: flex; align-items: center; gap: 1rem;
      background: #1e293b; border: 1px solid #334155; border-radius: 1rem;
      padding: 1.1rem 1.25rem; text-decoration: none; color: inherit;
      transition: background .15s, transform .15s;
    }
    a.app:hover { background: #273449; transform: translateY(-2px); }
    .emoji { font-size: 1.8rem; }
    .app .title { font-weight: 600; font-size: 1.05rem; }
    .app .desc { color: #94a3b8; font-size: .85rem; }
    footer { margin-top: 3rem; color: #475569; font-size: .8rem; }
  </style>
</head>
<body>
  <h1>deltarun apps</h1>
  <p class="sub">Tap an app to start. Add to your home screen to use it like an installed app.</p>
  <div class="apps">
    <a class="app" href="./quiz/home.html">
      <span class="emoji">&#128218;</span>
      <span>
        <div class="title">Study Quiz</div>
        <div class="desc">Practice quizzes across trades and topics</div>
      </span>
    </a>
  </div>
  <footer>Hosted on GitHub Pages</footer>
</body>
</html>
